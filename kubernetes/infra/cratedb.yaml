apiVersion: v1
kind: Service
metadata:
  name: cratedb
  namespace: octo-infra
  labels: { app: cratedb }
spec:
  clusterIP: None
  selector: { app: cratedb }
  ports:
    - { name: http, port: 4200, targetPort: 4200 }
    - { name: psql, port: 5432, targetPort: 5432 }
---
apiVersion: v1
kind: Service
metadata:
  name: cratedb-ext
  namespace: octo-infra
spec:
  type: NodePort
  selector: { app: cratedb }
  ports:
    - { name: http, port: 4200, targetPort: 4200, nodePort: 30420 }
    - { name: psql, port: 5432, targetPort: 5432, nodePort: 30543 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cratedb
  namespace: octo-infra
spec:
  serviceName: cratedb
  replicas: 1
  selector: { matchLabels: { app: cratedb } }
  template:
    metadata: { labels: { app: cratedb } }
    spec:
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w vm.max_map_count=262144"]
          securityContext: { privileged: true }
      containers:
        - name: cratedb
          image: crate:5.10.10
          args:
            - "crate"
            - "-Cdiscovery.type=single-node"
            - "-Cnetwork.host=0.0.0.0"
            - "-Cnode.name=cratedb01"
            - "-Cpath.repo=/data/backup"
          env:
            - { name: CRATE_HEAP_SIZE, value: "2g" }
          ports:
            - { containerPort: 4200, name: http }
            - { containerPort: 5432, name: psql }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: "/", port: 4200 }
            initialDelaySeconds: 20
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
